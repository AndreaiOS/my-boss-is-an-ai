name: MyBossIsAnAI
options:
  bundleIdPrefix: com.andreaios
  deploymentTarget:
    iOS: "17.0"
packages:
  MyBossCore:
    path: MyBossCore
targets:
  MyBossIsAnAIUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [UITests]
    dependencies:
      - target: MyBossIsAnAI
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: co.andreaios.mybossisanai.uitests
        TEST_TARGET_NAME: MyBossIsAnAI
  MyBossIsAnAI:
    type: application
    platform: iOS
    sources: [App]
    dependencies:
      - package: MyBossCore
      - sdk: GameKit.framework
    entitlements:
      path: App/MyBossIsAnAI.entitlements
      properties:
        com.apple.developer.game-center: true
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: LaunchBackground
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: co.andreaios.mybossisanai
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 2
        TARGETED_DEVICE_FAMILY: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: My Boss Is AI
        DEVELOPMENT_TEAM: RA4VQQK3U6
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        SWIFT_VERSION: 6.0
